# AAPL — Apple Inc.
*Brief generated: 2026-06-07 | Sources: sources/AAPL/10-k-fy2025.md, sources/AAPL/q2-2026-call.md*

---

## What the company does

Apple ออกแบบและขายสมาร์ทโฟน (iPhone), คอมพิวเตอร์ (Mac), แท็บเล็ต (iPad), wearables และบริการดิจิทัลครบวงจร ตั้งแต่ App Store ไปจนถึง AppleCare และ Apple Pay บริษัทควบคุม hardware, software และ chip ของตัวเองตั้งแต่ต้น รายได้หลักยังมาจาก iPhone แต่ Services กำลังกลายเป็น engine ที่สองที่มี margin สูงกว่าและรายได้แบบ recurring มากกว่า ทำให้ business model กำลัง compound ขึ้นในทิศทางที่ดีขึ้นเรื่อยๆ

---

## Latest earnings — Q2 FY2026 (January–March 2026)

- **รายได้รวม $111.2B (+17% YoY)** — March quarter record สูงกว่า high end of guidance ทุก geographic segment โตสองหลัก รวมถึง Greater China และ emerging markets *(source: sources/AAPL/q2-2026-call.md)*
- **iPhone $57B (+22% YoY)** — March record แม้มี supply constraints; iPhone 17 family เป็น launch lineup ที่ขายดีที่สุดในประวัติศาสตร์บริษัท; IDC ยืนยัน market share gain *(source: sources/AAPL/q2-2026-call.md)*
- **Services $31B (+16% YoY)** — all-time record; โตสองหลักทั้ง developed และ emerging markets *(source: sources/AAPL/q2-2026-call.md)*
- **EPS $2.10 (+22% YoY)** — โตเร็วกว่า revenue สะท้อน margin expansion และ buyback ที่ต่อเนื่อง *(source: sources/AAPL/q2-2026-call.md)*
- **Mac $8.4B (+6%), iPad $6.9B (+8%), Wearables $7.9B (+5%)** — ทุกหมวดโต แม้ Mac ยังมี supply constraints จาก demand สูงกว่าคาด *(source: sources/AAPL/q2-2026-call.md)*

---

## Bull case / Bear case

**Bull**
- **Switching costs ฝังลึก** — ผู้ใช้ lock-in ด้วย iMessage, iCloud, Apple Watch health data, AirDrop, AirPods ecosystem ต้นทุนการย้ายออกเป็น data และ habit ไม่ใช่แค่ความสะดวก ทำให้ pricing power แข็งและ churn ต่ำ *(source: sources/AAPL/10-k-fy2025.md)*
- **Services mix shift ยัง compound** — $31B all-time record ใน Q2 FY2026 พิสูจน์ว่า recurring revenue แข็งแกร่ง ยิ่ง Services สัดส่วนสูงขึ้น blended margin ของบริษัทในระยะ 3-5 ปีจะดีขึ้นต่อเนื่อง *(source: sources/AAPL/q2-2026-call.md)*
- **Apple Intelligence เป็น upgrade catalyst ที่เริ่มพิสูจน์ตัวเอง** — A19/A19 Pro chip on-device AI integration ทำให้ iPhone 17 family มีทั้ง upgrader และ first-time buyer แข็งแกร่ง *(source: sources/AAPL/q2-2026-call.md)*

**Bear**
- **iPhone concentration + minority global share** — iPhone คิดเป็นสัดส่วนใหญ่ของรายได้ แต่ Apple มี minority market share ในตลาด smartphone โลก growth จึงขึ้นอยู่กับ upgrade cycle และ share gain *(source: sources/AAPL/10-k-fy2025.md)*
- **Supply chain risk จาก tariff** — manufacturing กระจุกที่ China, Taiwan, Vietnam; US Tariffs เริ่มกระทบ Q2 2025 และ Section 232 investigation ครอบ semiconductors *(source: sources/AAPL/10-k-fy2025.md)*
- **Regulatory pressure บน App Store** — EU บังคับ open third-party payment แล้ว US กำลังตาม ถ้า take rate ถูกบังคับลดใน multiple markets Services margin จะถูก reprice อย่างถาวร *(source: sources/AAPL/10-k-fy2025.md)*

---

## What to ask before owning it

1. ถ้า EU + US บังคับลด App Store take rate พร้อมกัน Services margin จะเหลือเท่าไหร่ — และ thesis ที่เหลือยัง hold ไหม?
2. Greater China โตสองหลักใน Q2 FY2026 นี่คือ structural recovery หรือ one-quarter bounce ก่อนที่ Huawei จะกลับมากด?
3. Apple Intelligence จะทำให้ upgrade cycle สั้นจาก 3-4 ปีเป็น 2 ปีได้จริงไหม — มี data อะไรในช่วงหน้าที่จะพิสูจน์หรือหักล้างสมมติฐานนี้?
4. บริษัทใช้เงินเป็น buyback เป็นหลัก ถ้า valuation ขึ้นสูงจน buyback ไม่ accretive — shareholder return จะมาจากอะไรอีก?

# AVGO — Broadcom Inc.
*Brief generated: 2026-06-07 | Sources: training knowledge (ไม่มี sources/AVGO/ ใน project)*

---

## What the company does

Broadcom ออกแบบและขาย semiconductor chip และ infrastructure software ให้กับ data center, networking และ broadband industries รายได้หลักมาจากสองก้อนใหญ่คือ Semiconductor Solutions (chip สำหรับ AI, networking, storage) และ Infrastructure Software ที่รวม VMware หลังซื้อกิจการปี 2023 ในช่วง AI boom บริษัทกลายเป็นผู้เล่นสำคัญใน custom AI chip (XPU) ให้ hyperscaler อย่าง Google และ Meta ในแบบที่ NVIDIA ทำไม่ได้เพราะ use case ต่างกัน

---

## Latest earnings

> **ไม่มี earnings transcript ใน sources/AVGO/** ข้อมูลต่อไปนี้มาจาก training memory — อาจไม่ใช่ quarter ล่าสุด ควรตรวจสอบกับ earnings release จริงก่อนใช้ตัวเลข

- **FY2024 รายได้รวม ~$51.6B (+44% YoY)** — boosted จาก VMware consolidation เต็มปีครั้งแรก; fiscal year ของ Broadcom สิ้นสุด October
- **AI revenue FY2024 ~$12.2B** — เติบโตหลายเท่าจากปีก่อน driven by custom XPU ให้ hyperscaler
- **Non-GAAP gross margin ~76-79%** — ยืนสูงต่อเนื่อง สะท้อน pricing power ของทั้ง chip และ software แข็งแกร่ง
- **Infrastructure Software (VMware) margin expansion** — เปลี่ยน licensing model เป็น subscription; ช่วงแรกมี customer pushback แต่ renewal rate ยังอยู่ในระดับสูง
- **FY2025 guidance ชี้ AI momentum ต่อเนื่อง** — addressable market ของ custom AI chip ยังขยายตัว

---

## Bull case / Bear case

**Bull**
- **Cornered Resource ใน custom AI chip** — Broadcom เป็นหนึ่งในไม่กี่บริษัทโลกที่ออกแบบ XPU ให้ hyperscaler ระดับ Google และ Meta ได้จริง IP และ relationship ที่ฝังลึกทำให้ competitor ตามยาก
- **Switching Costs สูงใน Infrastructure Software** — enterprise ที่ run บน VMware มี friction สูงมากในการย้ายออก ทำให้ Broadcom มี pricing power และ recurring revenue ที่ compound ได้หลายปี
- **Semiconductor + Software dual engine** — blended margin ดีกว่า pure-play semiconductor company ส่วนใหญ่ในวงการ

**Bear**
- **Customer concentration ใน AI segment** — Google และ Meta คิดเป็นสัดส่วนใหญ่ของ XPU revenue ถ้า hyperscaler ตัดสินใจ in-house design เพิ่มขึ้น Broadcom เสีย revenue ก้อนใหญ่โดยไม่มี warning
- **VMware integration และ churn risk** — หลัง Broadcom เปลี่ยน pricing เป็น bundle subscription enterprise หลายรายแสดงความไม่พอใจ ถ้า churn สูงกว่าคาดใน FY2025-2026 Software segment จะ miss
- **Leverage จาก VMware deal ยังสูง** — กู้เงินก้อนใหญ่เพื่อซื้อ VMware $69B ถ้า free cash flow ชะลอ ability ในการ deleverage จะช้ากว่าที่ตลาดคาด

---

## What to ask before owning it

1. Google และ Meta คิดเป็นสัดส่วนเท่าไหร่ของ AI chip revenue — ถ้าทั้งสองลด order หรือ in-house เพิ่ม Broadcom จะ offset ด้วยลูกค้าใหม่ได้แค่ไหนและในกรอบเวลาเท่าไหร่?
2. VMware enterprise renewal rate หลังเปลี่ยนเป็น subscription model เป็นอย่างไร — customer ยอมรับ pricing ใหม่จริงหรือแค่ยังอยู่เพราะย้ายไม่ได้?
3. Broadcom โตจาก acquisition หลายครั้ง — leverage จาก VMware จะลดลงถึงระดับ comfortable ในกี่ปี และ capital allocation ก้อนต่อไปจะไปทางไหน?
4. ถ้า AI capex ของ hyperscaler ชะลอลงจริง XPU revenue จะ dip แค่ไหน — Semiconductor segment ที่เหลือ (networking, storage, broadband) จะรองรับได้มากน้อยแค่ไหน?

<script type="text/md" id="md-NVDA"

# NVDA — NVIDIA Corporation
*Brief generated: 2026-06-07 | Sources: training knowledge (ไม่มี sources/NVDA/ ใน project)*

---

## What the company does

NVIDIA ออกแบบ GPU และ AI computing platform ที่กลายเป็น infrastructure หลักของ AI revolution — ตั้งแต่ training โมเดลขนาดใหญ่ไปจนถึง inference ใน data center ทั่วโลก รายได้หลักมาจาก Data Center segment (H100/H200/Blackwell GPU) ที่ hyperscaler, cloud provider และ enterprise ต่างแย่งกันซื้อ นอกจาก hardware แล้ว CUDA software ecosystem ที่สะสมมากว่า 15 ปีเป็นตัวสร้าง switching cost ที่ลึกที่สุดในวงการ — นักพัฒนา AI เขียนโค้ดบน CUDA ก่อน แล้วจึงคิดเรื่อง hardware ทีหลัง

---

## Latest earnings

> **ไม่มี earnings transcript ใน sources/NVDA/** ข้อมูลต่อไปนี้มาจาก training memory — อาจไม่ใช่ quarter ล่าสุด ควรตรวจสอบกับ earnings release จริงก่อนใช้ตัวเลข

- **FY2025 Q3 (Oct 2024) รายได้ ~$35.1B (+94% YoY)** — Data Center revenue ~$30.8B คิดเป็นสัดส่วนกว่า 87% ของรายได้รวม; เกิน guidance อย่างมีนัย
- **Gross margin ~74-75% (non-GAAP)** — สูงกว่า semiconductor company ส่วนใหญ่มาก สะท้อน pricing power ที่แข็งแกร่ง
- **Blackwell ramp** — เริ่ม ship และ demand สูงกว่า supply มาก; guided revenue ไตรมาสถัดไปสูงกว่าคาด
- **Gaming และ Professional Visualization** — ฟื้นตัวจากจุดต่ำสุด แต่เป็นส่วนเล็กเมื่อเทียบกับ Data Center
- **EPS (non-GAAP) ~$0.81 (+103% YoY)** — โตเร็วกว่า revenue สะท้อน operating leverage ที่สูงมาก

---

## Bull case / Bear case

**Bull**
- **CUDA เป็น Process Power ที่สะสมมา 15+ ปี** — library, framework, และ toolchain ทั้งหมดถูก optimize มาสำหรับ NVIDIA GPU การ switch ไป AMD หรือ custom chip ต้องเขียนโค้ดใหม่ทั้งหมด
- **Data Center AI infrastructure ยังอยู่ใน early innings** — hyperscaler ประกาศ AI capex รวมกันหลักแสนล้านดอลลาร์ใน 2025-2026 ถ้า NVIDIA รักษา share ใน training workload ได้ demand จะ compound ไปอีกหลายปี
- **Scale Economies ใน R&D** — รายได้ที่สูงทำให้ NVIDIA ลงทุน R&D ได้มากกว่าคู่แข่ง ทุก generation chip ห่างจาก AMD และ custom XPU มากขึ้นในแง่ software maturity

**Bear**
- **Customer concentration และ hyperscaler in-house risk** — Google (TPU), Amazon (Trainium), Microsoft (Maia), Meta (MTIA) ต่างมี custom AI chip ของตัวเอง ถ้า in-house chip สุกพอสำหรับ inference workload NVIDIA จะเสีย addressable market ก้อนใหญ่
- **Export controls ตัด China market** — US government ban ทำให้ NVIDIA ขาย H100/H200 ใน China ไม่ได้ และ H20 ก็ถูกจำกัดเพิ่มเติม ถ้า ban ขยายต่อ revenue ceiling ลดลง
- **Valuation pricing growth หลายปีล่วงหน้า** — NVIDIA trade ที่ multiple สูงมาก ถ้า Data Center revenue miss แม้แต่ quarter เดียว re-rating จะรุนแรง

---

## What to ask before owning it

1. CUDA switching cost จะยืนได้นานแค่ไหน ถ้า AMD ROCm หรือ open-source alternative สุกพอ — developer จะ migrate หรือยังอยู่กับ CUDA?
2. ถ้า hyperscaler in-house chip จัดการ inference workload ส่วนใหญ่ได้เอง NVIDIA จะยังครอง training market ได้ไหม และ training market ใหญ่พอไหมที่จะ justify valuation ปัจจุบัน?
3. Export controls จะขยายไปถึง chip รุ่นไหนอีก — NVIDIA มี scenario planning อะไรสำหรับ China market ที่เล็กลงเรื่อยๆ?
4. ถ้า AI capex cycle ของ hyperscaler ชะลอลงใน 2026-2027 NVIDIA จะ bridge revenue ด้วยอะไร — Automotive, Robotics, หรือ Sovereign AI จะใหญ่พอไหม?

## What the company does

Rocket Lab เป็นบริษัท space launch และ space systems ที่ให้บริการส่งดาวเทียมขึ้นสู่วงโคจรด้วยจรวด Electron (small launch vehicle) และกำลัง develop จรวด Neutron ขนาดกลางที่คาดว่าจะ launch ได้ในอีกไม่กี่ปี นอกจาก launch บริษัทยังมี Space Systems segment ที่ผลิต satellite bus, solar panel และ components ให้กับ government และ commercial customers — ทำให้ revenue ไม่ได้ขึ้นอยู่กับ launch frequency เพียงอย่างเดียว บริษัทอยู่ในจุดตัดระหว่าง new space economy กับ defense/intelligence market ซึ่งเป็น customer ที่มี durability สูงและ barrier to entry สูงด้วย

---

## Latest earnings

> **ไม่มี earnings transcript ใน sources/RKLB/** ข้อมูลต่อไปนี้มาจาก training memory — อาจไม่ใช่ quarter ล่าสุด ควรตรวจสอบกับ earnings release จริงก่อนใช้ตัวเลข

- **Revenue ในช่วง Q3-Q4 2024 อยู่ในระดับ ~$100-130M ต่อไตรมาส** — เติบโตต่อเนื่อง YoY แต่ยังขาดทุนในระดับ operating; Space Systems เป็น segment ที่ใหญ่กว่า Launch ในแง่รายได้
- **Electron launch cadence** — แต่ละ launch สร้าง revenue ~$8-10M; reusability ของ Electron booster อยู่ในขั้นทดสอบ
- **Gross margin ยังต่ำและผันผวน** — Space Systems มี margin ดีกว่า Launch; ภาพรวมยังอยู่ในช่วง scale up และ burn cash
- **Neutron development** — ใช้เงิน R&D ก้อนใหญ่ต่อเนื่อง; timeline และ cost เป็นประเด็นที่นักลงทุนติดตามใกล้ชิด
- **Backlog $1B+** — สะท้อน demand ที่มีอยู่จริงแม้ยังไม่ recognize เป็น revenue

---

## Bull case / Bear case

**Bull**
- **Counter-positioning ต่อ SpaceX** — Electron เน้น dedicated small launch ที่ลูกค้าต้องการ orbit เฉพาะ เวลาเฉพาะ ไม่ต้องรอ rideshare; ลูกค้าที่ต้องการ control จะจ่ายแพงกว่าเพื่อความยืดหยุ่น
- **Space Systems เป็น recurring revenue base** — satellite components ให้ government/defense มี contract ยาวและ switching cost สูง ทำให้ revenue ไม่ volatile ตาม launch schedule
- **LEO constellation demand กำลังขยาย** — ถ้า Neutron สำเร็จ Rocket Lab จะมี platform รองรับ market หลายพันดวงในทศวรรษนี้ได้เต็ม

**Bear**
- **Neutron คือ bet ที่ใหญ่และ execution risk สูง** — จรวดขนาดกลางพัฒนายากและแพง ถ้า delay ยาวหรือ cost overrun หนัก บริษัทต้องระดมทุนเพิ่ม dilute ผู้ถือหุ้น และ TAM thesis จะเลื่อนออกไป
- **ยังขาดทุนและ burn cash** — ถ้า market environment เปลี่ยน (interest rate สูง, risk appetite ลด) การระดมทุนจะแพงขึ้นหรือยากขึ้น
- **SpaceX ขยาย Falcon 9 rideshare ลงมากด small launch** — ถ้า SpaceX pricing ถูกลงและ schedule ดีขึ้น value proposition ของ dedicated small launch จะแคบลง

---

## What to ask before owning it

1. Neutron มี milestone อะไรที่ verify ได้ใน 12-24 เดือนหน้า — และถ้า miss milestone นั้น thesis เปลี่ยนอย่างไร?
2. Space Systems backlog มาจาก government/defense เท่าไหร่ — ถ้า defense budget ถูกตัด revenue ส่วนไหนที่เสี่ยงหายก่อน?
3. Electron booster reuse สำเร็จ launch margin จะดีขึ้นแค่ไหนและในกรอบเวลาเท่าไหร่?
4. บริษัทมี cash runway อีกกี่ปีก่อนต้องระดมทุนรอบถัดไป — และ dilution risk ในช่วงนั้นจะเป็นเท่าไหร่?

## What the company does

Tesla ออกแบบและผลิตรถยนต์ไฟฟ้า (Model 3, Model Y, Model S, Model X, Cybertruck) พร้อมกับโครงข่ายชาร์จ Supercharger และธุรกิจพลังงาน (Powerwall, Megapack) รายได้หลักยังมาจากการขายรถยนต์ แต่ฝ่ายบริหารวาง thesis ระยะยาวไว้ที่ซอฟต์แวร์ขับเคลื่อนอัตโนมัติ (FSD) และ Robotaxi ที่กำลังพัฒนา — ถ้า thesis นั้นเป็นจริง โมเดลธุรกิจจะเปลี่ยนโครงสร้างจากผู้ผลิตรถเป็น platform ขนส่ง

---

## Latest earnings

> ผมไม่แน่ใจว่า quarter ล่าสุดที่ออกแล้วคืออะไร อิงจากที่ผมรู้คือ Q4 2024 / Q1 2025 — ตรวจสอบกับ transcript จริงก่อนตัดสินใจลงทุน

- **รายได้และ margin** ถูกกดดันต่อเนื่องจากการลดราคาขายหลายรอบ gross margin ยานยนต์ลดลงจากระดับ 25%+ เมื่อปี 2022 มาอยู่ราว 17-18%
- **กำไรสุทธิ** ยังเป็นบวก แต่ลดลงชัดเจน นักลงทุนจับตาว่า margin จะ stabilize หรือยังลงต่อ
- **FSD และ Robotaxi** เป็นประเด็นหลักทุก earnings call — ฝ่ายบริหารระบุว่านี่คือ upside ที่ใหญ่ที่สุดของบริษัท แต่ timeline ล่าช้าซ้ำหลายรอบ
- **Cybertruck และ Energy (Megapack)** เริ่มมีสัดส่วนรายได้มากขึ้น โดยเฉพาะ Energy ที่ margin ดีและเติบโตเร็ว
- **Capital allocation** Tesla ลงทุนในโรงงานและ R&D ต่อเนื่อง ยังไม่ใช่บริษัทที่ return cash คืนผู้ถือหุ้น

---

## Bull case

- **FSD / Robotaxi เป็น option ที่มีค่า** — ถ้า Tesla scale Robotaxi ได้จริง บริษัทเปลี่ยนจากผู้ผลิตรถเป็น platform ขนส่ง ซึ่งอยู่ในจุดตัดระหว่างเทคโนโลยีกับอุตสาหกรรมเก่าอย่างแท้จริง
- **โครงข่าย Supercharger เป็น Process Power** — ลงทุนสร้างมาหลายปี คู่แข่งยังตาม gap ไม่ทัน ทั้งจำนวนสถานีและประสบการณ์ผู้ใช้
- **Energy (Megapack) เป็น infrastructure ของ grid** — addressable market ใหญ่มากตาม adoption พลังงานสะอาด margin ดีกว่า automotive และไม่ต้องพึ่ง FSD story

---

## Bear case

- **Margin pressure ยังไม่มีสัญญาณฟื้น** — BYD และแบรนด์จีนขาย EV ราคาต่ำกว่ามากในตลาดโลก ถ้า Tesla ต้องลดราคาต่อเพื่อรักษา volume revenue durability อ่อนแอกว่าที่ valuation สะท้อน
- **FSD timeline ล่าช้าซ้ำซาก** — thesis นี้ถูกพูดมาหลายปี ถ้านับจำนวนครั้งที่ deadline เลื่อน นักลงทุนต้องตั้งคำถามว่า addressable market จะยังอยู่เมื่อ Tesla พร้อม หรือคู่แข่ง (Waymo, แบรนด์จีน) จะ capture ไปก่อน
- **Elon Musk concentration risk** — ความสนใจแบ่งไปหลายบริษัท และ reputational events ส่งผลต่อ brand ได้ทันที โดยเฉพาะในตลาดที่ Tesla ต้องการ grow

---

## What to ask before owning it

1. **ฉันเชื่อ FSD / Robotaxi thesis ไหม** และถ้าไม่มี — บริษัทนี้ worth ราคาปัจจุบันไหมในฐานะผู้ผลิตรถยนต์เพียวๆ?
2. **Kill condition ของฉันคืออะไร?** — ถ้า gross margin automotive ลงต่ำกว่า X% อีก 2 quarter ติด หรือถ้า Robotaxi launch ล่าช้าออกไปอีกเกิน Y ปี ฉันจะออก?
3. **Energy (Megapack) thesis แยกจาก FSD thesis ไหม?** — ถ้าชอบ Energy business แต่ไม่แน่ใจ FSD มีวิธีประเมิน value แยกกันได้หรือเปล่า?
4. **ฉันรับ Elon Musk concentration risk ได้ไหม?** — นี่คือความเสี่ยงที่ hedge ไม่ได้และทำนายไม่ได้
5. **สัดส่วนใน portfolio เหมาะสมไหม?** — TSLA เป็น high-beta stock ที่ขึ้นลงแรง ถ้า thesis ผิดผลขาดทุนจะกระทบ portfolio มากแค่ไหน?

<script>
  // ── Markdown to HTML ──────────────────────────────────────────
  function fmt(text) {
    // Bold before italic to avoid conflicts
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic: * and _
    text = text.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
    text = text.replace(/_([^_]+?)_/g, '<em>$1</em>');
    // Inline code
    text = text.replace(/`([^`]+?)`/g, '<code>$1</code>');
    return text;
  }

  function mdToHtml(raw) {
    const lines = raw.split('\n');
    const out = [];
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      const t = line.trim();

      if (t.startsWith('# ')) {
        out.push('<h1>' + fmt(t.slice(2)) + '</h1>');
        i++; continue;
      }
      if (t.startsWith('## ')) {
        out.push('<h2>' + fmt(t.slice(3)) + '</h2>');
        i++; continue;
      }
      if (t.startsWith('### ')) {
        out.push('<h3>' + fmt(t.slice(4)) + '</h3>');
        i++; continue;
      }
      if (t === '---') {
        out.push('<hr>');
        i++; continue;
      }
      // Blockquote: collect consecutive > lines
      if (t.startsWith('> ')) {
        const bq = [];
        while (i < lines.length && lines[i].trim().startsWith('> ')) {
          bq.push('<p>' + fmt(lines[i].trim().slice(2)) + '</p>');
          i++;
        }
        out.push('<blockquote>' + bq.join('') + '</blockquote>');
        continue;
      }
      // Unordered list: collect consecutive - lines
      if (t.startsWith('- ')) {
        const items = [];
        while (i < lines.length && lines[i].trim().startsWith('- ')) {
          items.push('<li>' + fmt(lines[i].trim().slice(2)) + '</li>');
          i++;
        }
        out.push('<ul>' + items.join('') + '</ul>');
        continue;
      }
      // Ordered list: collect consecutive N. lines
      if (/^\d+\. /.test(t)) {
        const items = [];
        while (i < lines.length && /^\d+\. /.test(lines[i].trim())) {
          items.push('<li>' + fmt(lines[i].trim().replace(/^\d+\. /, '')) + '</li>');
          i++;
        }
        out.push('<ol>' + items.join('') + '</ol>');
        continue;
      }
      // Empty line
      if (t === '') { i++; continue; }
      // Paragraph
      out.push('<p>' + fmt(t) + '</p>');
      i++;
    }
    return out.join('\n');
  }

  // ── Build brief list from embedded script tags ─────────────────
  const TICKERS = ['AAPL', 'AVGO', 'NVDA', 'RKLB', 'TSLA'];

  const briefs = TICKERS.map(ticker => {
    const el = document.getElementById('md-' + ticker);
    return {
      ticker:  el.dataset.ticker,
      name:    el.dataset.name,
      date:    el.dataset.date,
      preview: el.dataset.preview,
      md:      el.textContent.trim()
    };
  });

  // ── State ──────────────────────────────────────────────────────
  let activeTicker = null;

  // ── Render gallery ─────────────────────────────────────────────
  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = briefs.map(b => `
      <div class="card" id="card-${b.ticker}" onclick="showBrief('${b.ticker}')">
        <div class="card-ticker">${b.ticker}</div>
        <div class="card-name">${b.name}</div>
        <div class="card-date">${b.date}</div>
        <div class="card-preview">${b.preview}</div>
      </div>
    `).join('');
  }

  // ── Show full brief ────────────────────────────────────────────
  function showBrief(ticker) {
    // Update active card
    if (activeTicker) {
      const prev = document.getElementById('card-' + activeTicker);
      if (prev) prev.classList.remove('active');
    }
    activeTicker = ticker;
    const card = document.getElementById('card-' + ticker);
    if (card) card.classList.add('active');

    // Render brief
    const b = briefs.find(x => x.ticker === ticker);
    document.getElementById('detail-label').textContent = b.ticker + ' — ' + b.name;
    document.getElementById('brief-output').innerHTML = mdToHtml(b.md);

    // Show detail panel
    const detail = document.getElementById('detail');
    detail.style.display = 'block';

    // Scroll to detail
    setTimeout(() => detail.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }

  // ── Close detail ───────────────────────────────────────────────
  function closeDetail() {
    document.getElementById('detail').style.display = 'none';
    if (activeTicker) {
      const card = document.getElementById('card-' + activeTicker);
      if (card) card.classList.remove('active');
      activeTicker = null;
    }
  }

  // ── Init ───────────────────────────────────────────────────────
  renderGallery();
</script>
